<app-site-navbar />

<main class="profile-container">
  <header class="page-header">
    <h1 class="page-title">A MINHA CONTA</h1>
    <p class="page-subtitle">Gerencie suas informacoes pessoais e os dados usados no Reservae.</p>
  </header>

  <div class="profile-grid">
    <aside class="sidebar">
      <div class="user-snapshot">
        <div class="avatar-wrapper"></div>
        <h3>{{ displayName() }}</h3>
        <p>{{ email() }}</p>
      </div>

      <div class="nav-tabs">
        <button class="nav-tab active" type="button">
          <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
          Dados Pessoais
        </button>
        <button class="nav-tab" type="button" routerLink="/meus-ingressos">
          <svg viewBox="0 0 24 24"><polyline points="12 8 12 12 14 14"></polyline><circle cx="12" cy="12" r="10"></circle></svg>
          Historico de Compras
        </button>
      </div>
    </aside>

    <section class="content-area">
      <div id="tab-dados" class="tab-content active">
        <h2 class="section-title">Dados Pessoais</h2>

        @if (authStore.error()) {
          <div class="form-group full">
            <p class="form-label">{{ authStore.error() }}</p>
          </div>
        }

        @if (saved()) {
          <div class="form-group full">
            <p class="form-label">Perfil atualizado com sucesso.</p>
          </div>
        }

        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Nome Completo</label>
            <input
              type="text"
              name="name"
              class="input-field"
              [ngModel]="fullName()"
              (ngModelChange)="fullName.set($event)"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Endereco de E-mail</label>
            <input type="email" name="email" class="input-field" [value]="email()" disabled />
          </div>
          <div class="form-group">
            <label class="form-label">Identificador</label>
            <input type="text" class="input-field" [value]="authStore.userId() ?? 'Nao informado'" disabled />
          </div>
          <div class="form-group">
            <label class="form-label">CPF / Documento</label>
            <input
              type="text"
              class="input-field"
              [ngModel]="document()"
              (ngModelChange)="document.set($event)"
            />
          </div>
        </div>
        <button class="btn-action" type="button" [disabled]="authStore.loading()" (click)="saveProfile()">
          {{ authStore.loading() ? 'Guardando...' : 'Guardar Alteracoes' }}
        </button>
      </div>
    </section>
  </div>
</main>

<app-site-footer />
