<app-admin-shell breadcrumbRoot="Gestao" breadcrumbCurrent="Eventos">
  <section class="events-page">
    <div class="page-heading">
      <div>
        <h1>Meus Eventos</h1>
        <p>Faca a gestao de shows, configure lotes e acompanhe as vendas.</p>
      </div>
      <a routerLink="/criar-evento" class="primary-action">Criar Evento</a>
    </div>

    <div class="filter-bar">
      <input type="text" placeholder="Procurar evento pelo nome, local ou data..." />
      <button type="button">Status: Todos</button>
      <button type="button">Filtros</button>
    </div>

    <div class="data-card">
      <table>
        <thead>
          <tr>
            <th>Evento</th>
            <th>Data & Local</th>
            <th>Vendas</th>
            <th>Status</th>
            <th>Acoes</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td colspan="5">
              {{ store.catalogListPending() || 'Area reservada para a futura gestao completa de eventos.' }}
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</app-admin-shell>
