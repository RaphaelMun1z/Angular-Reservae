<header class="absolute top-0 left-0 w-full z-40 px-8 py-6 flex justify-between items-center">
  <a
    routerLink="/index"
    class="inline-flex items-center justify-center w-12 h-12 bg-brand rounded-full text-white font-black text-xl tracking-tighter shadow-[0_0_15px_rgba(255,98,77,0.3)] hover:scale-105 transition-transform"
  >
    <img src="/assets/icon_logo_dark.png" alt="Reservae" class="brand-logo-image" />
  </a>
</header>

<main class="flex-1 flex items-center justify-center relative z-10 px-6 py-20">
  <div
    class="absolute top-1/2 left-1/2 w-[400px] h-[400px] bg-brand/20 rounded-full blur-[120px] pointer-events-none glow-bg transform -translate-x-1/2 -translate-y-1/2 origin-top-left"
  ></div>

  <div
    class="w-full max-w-md bg-dark-card/80 backdrop-blur-xl border border-dark-border rounded-3xl p-8 sm:p-10 shadow-2xl relative"
  >
    <div class="text-center mb-8">
      <h1 class="text-3xl font-black text-white mb-2 tracking-tight">Bem-vindo de volta!</h1>
      <p class="text-sm font-medium text-gray-400">Acesse sua conta para gerenciar seus ingressos.</p>
    </div>

    @if (authStore.error()) {
      <div class="rounded-xl border border-brand/30 bg-brand/10 px-4 py-3 text-sm font-semibold text-brand mb-5">
        {{ authStore.error() }}
      </div>
    }

    <form class="space-y-5">
      <div class="rounded-xl border border-dark-border bg-dark-bg px-4 py-4 text-sm font-semibold text-gray-300">
        O acesso seguro e feito pelo Keycloak. O Reservae nao coleta sua senha nesta tela.
      </div>

      <div aria-hidden="true">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">E-mail</label>
        <div class="relative">
          <input
            type="email"
            placeholder="seu@email.com"
            disabled
            class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 px-4 text-white transition-colors placeholder-gray-600 opacity-60"
          />
        </div>
      </div>

      <div aria-hidden="true">
        <label class="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Senha</label>
        <div class="relative">
          <input
            type="password"
            placeholder="********"
            disabled
            class="w-full bg-dark-bg border border-dark-border rounded-xl py-3 px-4 text-white transition-colors placeholder-gray-600 opacity-60"
          />
        </div>
      </div>

      <button
        type="button"
        class="w-full bg-brand hover:bg-brand-dark text-white py-4 rounded-xl font-bold transition-all shadow-[0_10px_20px_rgba(255,98,77,0.2)] mt-4"
        [disabled]="authStore.loading()"
        (click)="login()"
      >
        {{ authStore.loading() ? 'Abrindo Keycloak...' : 'Entrar com Keycloak' }}
      </button>
    </form>

    <div class="mt-8 text-center text-sm font-semibold text-gray-400">
      Ainda nao tem uma conta?
      <button type="button" class="text-white hover:text-brand transition-colors ml-1" (click)="login()">
        Criar acesso
      </button>
    </div>
  </div>
</main>
