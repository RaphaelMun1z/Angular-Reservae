<div class="user-menu">
  @if (!authenticated()) {
    <button type="button" class="login-button" (click)="login()">Entrar</button>
  } @else {
    <button
      type="button"
      class="avatar-button"
      aria-label="Abrir menu do usuario"
      aria-haspopup="menu"
      [attr.aria-expanded]="isOpen()"
      (click)="toggle($event)"
    >
      @if (avatarUrl) {
        <img [src]="avatarUrl" [alt]="'Avatar de ' + displayName()" />
      } @else {
        <span>{{ initials }}</span>
      }
    </button>
  }

  @if (authenticated() && isOpen()) {
    <div class="user-popup" role="menu" (click)="$event.stopPropagation()">
      <div class="user-summary">
        <div class="summary-avatar">
          @if (avatarUrl) {
            <img [src]="avatarUrl" [alt]="'Avatar de ' + displayName()" />
          } @else {
            <span>{{ initials }}</span>
          }
        </div>
        <div>
          <strong>{{ displayName() }}</strong>
          <small>{{ displayEmail() }}</small>
        </div>
      </div>

      <nav aria-label="Opcoes do usuario">
        <a routerLink="/perfil" role="menuitem" (click)="close()">
          <lucide-icon name="user-circle" size="16" aria-hidden="true"></lucide-icon>
          Meu perfil
        </a>
        <a routerLink="/meus-ingressos" role="menuitem" (click)="close()">
          <lucide-icon name="ticket" size="16" aria-hidden="true"></lucide-icon>
          Meus ingressos
        </a>
        <a routerLink="/meus-pedidos" role="menuitem" (click)="close()">
          <lucide-icon name="receipt-text" size="16" aria-hidden="true"></lucide-icon>
          Meus pedidos
        </a>
        <a routerLink="/configuracoes" role="menuitem" (click)="close()">
          <lucide-icon name="settings" size="16" aria-hidden="true"></lucide-icon>
          Configuracoes
        </a>
        @if (isAdmin()) {
          <a routerLink="/dashboard" role="menuitem" (click)="close()">
            <lucide-icon name="gauge" size="16" aria-hidden="true"></lucide-icon>
            Administracao
          </a>
        }
      </nav>

      <button class="logout" type="button" role="menuitem" (click)="logout()">
        <lucide-icon name="log-out" size="16" aria-hidden="true"></lucide-icon>
        Sair
      </button>
    </div>
  }
</div>
