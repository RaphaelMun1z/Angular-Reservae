<div class="user-menu">
  <button
    type="button"
    class="avatar-button"
    aria-label="Abrir menu do usuario"
    aria-haspopup="menu"
    [attr.aria-expanded]="isOpen()"
    (click)="toggle($event)"
  >
    @if (avatarUrl) {
      <img [src]="avatarUrl" [alt]="'Avatar de ' + displayName()" />
    } @else {
      <span>{{ initials }}</span>
    }
  </button>

  @if (isOpen()) {
    <div class="user-popup" role="menu" (click)="$event.stopPropagation()">
      <div class="user-summary">
        <div class="summary-avatar">
          @if (avatarUrl) {
            <img [src]="avatarUrl" [alt]="'Avatar de ' + displayName()" />
          } @else {
            <span>{{ initials }}</span>
          }
        </div>
        <div>
          <strong>{{ displayName() }}</strong>
          <small>{{ displayEmail() }}</small>
        </div>
      </div>

      <nav aria-label="Opcoes do usuario">
        <a routerLink="/perfil" role="menuitem" (click)="close()">
          <lucide-icon name="user-circle" size="16" aria-hidden="true"></lucide-icon>
          Meu perfil
        </a>
        <a routerLink="/meus-ingressos" role="menuitem" (click)="close()">
          <lucide-icon name="ticket" size="16" aria-hidden="true"></lucide-icon>
          Meus ingressos
        </a>
        <a routerLink="/configuracoes" role="menuitem" (click)="close()">
          <lucide-icon name="settings" size="16" aria-hidden="true"></lucide-icon>
          Configuracoes
        </a>
      </nav>

      <a class="logout" routerLink="/login" role="menuitem" (click)="logout()">
        <lucide-icon name="log-out" size="16" aria-hidden="true"></lucide-icon>
        Sair
      </a>
    </div>
  }
</div>
